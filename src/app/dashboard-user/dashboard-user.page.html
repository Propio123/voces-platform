<ion-content class="ion-padding">
  <h2>Panel del Usuario</h2>
  <p>Bienvenido a tu espacio personal.</p>

  <ion-card routerLink="/chat">
    <ion-card-header>
      <ion-card-title>Asistente IA</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      Consulta a la inteligencia artificial sobre cómo mejorar tus condiciones laborales.
    </ion-card-content>
  </ion-card>

  <ion-card routerLink="/evaluate-salary">
    <ion-card-header>
      <ion-card-title>Evaluar mi salario</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      Obtén un análisis justo de tus ingresos y recomendaciones profesionales.
    </ion-card-content>
  </ion-card>
</ion-content>
