<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Panel ONG</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list>
    <ion-item *ngFor="let user of users">
      <ion-label>
        <h2>{{ user.email }}</h2>
        <p>Rol: {{ user.role }}</p>
        <small>Creado: {{ user.createdAt?.toDate() | date }}</small>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
