<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Registro</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item>
    <ion-label position="floating">Nombre completo</ion-label>
    <ion-input [(ngModel)]="name"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Email</ion-label>
    <ion-input type="email" [(ngModel)]="email"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Contraseña</ion-label>
    <ion-input type="password" [(ngModel)]="password"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label>Tipo de usuario</ion-label>
    <ion-select [(ngModel)]="role">
      <ion-select-option value="normal">Normal (solo evaluación)</ion-select-option>
      <ion-select-option value="registered">Registrado (IA + mejoras)</ion-select-option>
    </ion-select>
  </ion-item>

  <ion-button expand="block" color="success" (click)="register()">Registrarse</ion-button>
</ion-content>
