<ion-content class="ion-padding">
  <h2>Noticias</h2>

  <div class="news-container">
    <ion-card *ngFor="let n of newsList">
      <img [src]="n.image" alt="noticia" />
      <ion-card-header>
        <ion-card-title>{{ n.title }}</ion-card-title>
        <ion-card-subtitle>{{ n.date }}</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>{{ n.summary }}</ion-card-content>
    </ion-card>
  </div>
</ion-content>
